<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmar Presenca - Terca 28/04</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Poppins, sans-serif; background: linear-gradient(135deg, #f5f0e8 0%, #ede4d3 100%); min-height: 100vh; padding: 2rem 1rem; display: flex; align-items: center; justify-content: center; }
.container { max-width: 600px; width: 100%; }
.card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: slideUp 0.6s ease-out; }
.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-family: Playfair Display, serif; font-size: 2.2rem; color: #2c2c2c; margin-bottom: 0.5rem; }
.header .subtitle { font-size: 1.1rem; color: #8b7355; font-weight: 500; }
.aula-info { background: linear-gradient(135deg, #d4a574 0%, #c19a6b 100%); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; text-align: center; }
.aula-data { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
.aula-horario { font-size: 1.2rem; opacity: 0.95; }
.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; font-size: 0.95rem; font-weight: 600; color: #2c2c2c; margin-bottom: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input { width: 100%; padding: 1rem; border: 2px solid #e8dcc8; border-radius: 10px; font-size: 0.95rem; font-family: Poppins, sans-serif; transition: all 0.3s; background: white; }
.form-group input:focus { outline: none; border-color: #c19a6b; background: #fafaf8; }
.btn-verificar { width: 100%; padding: 1rem; background: linear-gradient(135deg, #d4a574 0%, #c19a6b 100%); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0.5rem; }
.btn-verificar:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(193,154,107,0.4); }
#stepConfirmacao { display: none; }
.aluno-nome { font-size: 1.2rem; font-weight: 600; color: #2c2c2c; text-align: center; margin-bottom: 1.5rem; padding: 1rem; background: #f9f6f0; border-radius: 10px; border-left: 4px solid #c19a6b; }
.confirmation-section { background: #f9f6f0; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border-left: 4px solid #c19a6b; }
.confirmation-question { font-size: 1.1rem; color: #2c2c2c; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
.button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.btn { padding: 1.2rem; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 700; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
.btn.confirm { background: linear-gradient(135deg, #a8d5ba, #7ec8a3); color: white; }
.btn.confirm:hover { transform: translateY(-2px); }
.btn.deny { background: #fde4e4; color: #8b2a2a; border: 2px solid #e85d5d; }
.btn.deny:hover { transform: translateY(-2px); background: #f5d5d5; }
.alert { padding: 1rem; border-radius: 10px; margin-bottom: 1.5rem; font-weight: 500; display: none; }
.alert.success { background: #d4f1e4; color: #1a6b47; border-left: 4px solid #7ec8a3; display: block; }
.alert.error { background: #fde4e4; color: #8b2a2a; border-left: 4px solid #e85d5d; display: block; }
.info-box { background: #f5f0e8; padding: 1rem; border-radius: 10px; margin-top: 2rem; font-size: 0.9rem; color: #6b5944; line-height: 1.6; text-align: center; }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 600px) { .card { padding: 1.5rem; } .header h1 { font-size: 1.8rem; } .button-group { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container"><div class="card">
<div class="header"><h1>Confirme sua Presença</h1><p class="subtitle">Aula de Cerâmica - 28 de Abril</p></div>
<div class="aula-info"><div class="aula-data">28 de Abril de 2026</div><div class="aula-horario">Terça-feira - 16:00</div></div>
<div id="alertContainer"></div>
<div id="stepVerificacao">
<div class="form-group"><label>Digite seu e-mail de inscrição</label><input type="email" id="emailVerificacao" placeholder="seu@email.com" autocomplete="email"></div>
<button class="btn-verificar" onclick="verificarEmail()">Verificar Inscrição</button>
</div>
<div id="stepConfirmacao">
<div class="aluno-nome" id="nomeExibido"></div>
<div class="confirmation-section"><div class="confirmation-question">Você vai comparecer à aula?</div>
<div class="button-group"><button type="button" class="btn confirm" onclick="confirmarPresenca()">Sim, Vou!</button><button type="button" class="btn deny" onclick="cancelarPresenca()">Não Posso</button></div>
</div></div>
<div class="info-box">Confirme sua presença para organizar melhor a aula. Se não puder comparecer, avise com antecedência.</div>
</div></div>
<script>
var ins=[{n:"Patricia Chambela",e:"patricia@chambela.com.br"},{n:"Gabriela Moraro",e:"gabimoraro.arq@gmail.com"},{n:"Carol Balthor",e:"carol@arcstudio.com.br"},{n:"Katherine M.Fernandez",e:"kte.fernandez@gmail.com"},{n:"Bianca",e:"biancamnocera@gmail.com"},{n:"Mariana Gaspar Valerio",e:"mariana.gaspar25@gmail.com"},{n:"Patricia Malizia",e:"pmgmalizia@gmail.com"}];
var cur=null;
function alerta(m,t){var d=document.createElement("div");d.className="alert "+t;d.textContent=m;var c=document.getElementById("alertContainer");c.innerHTML="";c.appendChild(d);setTimeout(function(){d.style.display="none";},6000);}
function verificarEmail(){var em=document.getElementById("emailVerificacao").value.trim().toLowerCase();if(!em){alerta("Por favor, digite seu e-mail.","error");return;}var a=null;for(var i=0;i<ins.length;i++){if(ins[i].e.toLowerCase()===em){a=ins[i];break;}}if(a){cur=a;document.getElementById("nomeExibido").textContent="Olá, "+a.n+"!";document.getElementById("stepVerificacao").style.display="none";document.getElementById("stepConfirmacao").style.display="block";}else{alerta("E-mail não encontrado na lista. Verifique se digitou corretamente ou entre em contato com a professora.","error");}}
function salvar(n,e,s){var r=JSON.parse(localStorage.getItem("conf_terca_28")||"[]");var idx=-1;for(var i=0;i<r.length;i++){if(r[i].e===e){idx=i;break;}}var d=new Date().toLocaleString("pt-BR");if(idx>=0)r[idx]={n:n,e:e,s:s,d:d};else r.push({n:n,e:e,s:s,d:d});localStorage.setItem("conf_terca_28",JSON.stringify(r));}
function confirmarPresenca(){if(!cur)return;salvar(cur.n,cur.e,"confirmado");document.getElementById("stepConfirmacao").style.display="none";alerta("Presença confirmada! Até terça-feira, "+cur.n+"!","success");cur=null;}
function cancelarPresenca(){if(!cur)return;salvar(cur.n,cur.e,"ausente");document.getElementById("stepConfirmacao").style.display="none";alerta("Entendemos, "+cur.n+". Você foi registrado como ausente.","error");cur=null;}
document.addEventListener("DOMContentLoaded",function(){document.getElementById("emailVerificacao").addEventListener("keypress",function(e){if(e.key==="Enter")verificarEmail();});});
</script>
</body></html>
